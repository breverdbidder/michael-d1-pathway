name: Weekly SwimCloud Sync

on:
  schedule:
    # Run every Monday at 6 AM EST (11 AM UTC)
    - cron: '0 11 * * 1'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if no changes'
        required: false
        default: 'false'

jobs:
  sync-times:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: Run SwimCloud scraper
        run: |
          python scripts/scrape_swimcloud.py
        continue-on-error: true
      
      - name: Run qualification checker
        run: |
          python scripts/check_qualifications.py
      
      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet data/ || echo "changes=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true' || github.event.inputs.force_update == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "🏊 Weekly data sync - $(date +'%Y-%m-%d')" || exit 0
          git push
      
      - name: Create summary
        run: |
          echo "## 🏊 Michael Shapira - Weekly Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files Updated" >> $GITHUB_STEP_SUMMARY
          echo "- \`data/personal_bests_scraped.json\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`data/recent_results.json\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`data/qualification_analysis.json\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[SwimCloud Profile](https://www.swimcloud.com/swimmer/3250085/)" >> $GITHUB_STEP_SUMMARY

  notify-on-pr:
    runs-on: ubuntu-latest
    needs: sync-times
    if: success()
    
    steps:
      - name: Check for new PRs
        run: |
          echo "Weekly sync completed successfully"
          # Could add Slack/Discord notification here
